<!DOCTYPE html>
<html>
<head>
    <title>File Upload Utility Interface</title>
</head>
<body>

    <h2>File Upload Utility Interface</h2>

    <!-- Drag and Drop Zone -->
    <fieldset>
        <legend>Drag & Drop Zone</legend>
        <p>Drag and drop files here OR click below to select files</p>
        <input type="file" multiple>
    </fieldset>

    <br>

    <!-- Uploaded Files List -->
    <fieldset>
        <legend>Uploaded Files</legend>
        <ul>
            <li>file1.pdf</li>
            <li>image1.jpg</li>
            <li>document.docx</li>
        </ul>
    </fieldset>

    <br>

    <!-- Progress Bar -->
    <fieldset>
        <legend>Conversion Progress</legend>
        <label>File Conversion Progress:</label><br><br>
        <progress value="60" max="100"></progress>
        <p>60% completed</p>
    </fieldset>

    <br>

    <!-- Convert Button -->
    <button>Start Conversion</button>

</body>
</html>
